name: Update Electricity Data

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/fetch_electricity.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/electricity.json public/data/metadata.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update electricity data [$(date -u +%Y-%m-%d)]"
            git push
          fi
