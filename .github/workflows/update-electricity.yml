name: Update Electricity Data

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/fetch_electricity.py
        env:
          OE_API_KEY: ${{ secrets.OE_API_KEY }}
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/electricity.json public/data/metadata.json
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: update electricity data [$(date -u +%Y-%m-%d)]"
          # Retry push with rebase to handle concurrent updates from news workflow
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push failed, attempt $i — pulling with rebase..."
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          git push
